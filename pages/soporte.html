<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<header>
    <h1>🎮 GameStore</h1>
    <nav>
        <a href="../index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="carrito.html">Carrito</a>
        <a href="perfil.html">Perfil</a>
    </nav>
</header>

<section class="soporte-container">

    <div class="soporte-card">

        <h2>Centro de Soporte</h2>
        <p class="descripcion">¿Tienes algún problema? Escríbenos y te ayudaremos lo más rápido posible.</p>

        <!-- FORMULARIO -->
        <form class="soporte-form">
            <input type="text" placeholder="Nombre completo" required>
            <input type="email" placeholder="Correo electrónico" required>

            <select required>
                <option value="">Selecciona un problema</option>
                <option>Problema con compra</option>
                <option>No puedo iniciar sesión</option>
                <option>Error en el juego</option>
                <option>Otro</option>
            </select>

            <textarea placeholder="Describe tu problema..." rows="4"></textarea>

            <button type="submit">Enviar solicitud</button>
        </form>

        <!-- CONTACTO -->
        <div class="contacto">
            <p>📧 soporte@gamestore.com</p>
            <p>📞 +593 999 999 999</p>
        </div>

    </div>

</section>

</body>
</html>
